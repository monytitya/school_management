<!DOCTYPE html>
<html>

<head>
    <title>Student Form</title>
</head>

<body>
    <h2>Add Student</h2>
    <form action="test.php?action=create" method="POST">
        First Name: <input type="text" name="firstName" required><br>
        Last Name: <input type="text" name="lastName" required><br>

    <a href="test.php?action=read">View Students</a>
</body>
